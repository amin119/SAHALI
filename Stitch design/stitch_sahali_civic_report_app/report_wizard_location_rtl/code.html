            font-variation-settings: 'FILL' 0, 'wght' 400, 'GRAD' 0, 'opsz' 24;
            display: inline-block;
            line-height: 1;
            text-transform: none;
            letter-spacing: normal;
            word-wrap: normal;
            white-space: nowrap;
            direction: ltr;
        }

            height: 50vh;
            min-height: 350px;
        }

        .pulse-animation {
            animation: pulse 2s cubic-bezier(0.4, 0, 0.6, 1) infinite;
        }

        @keyframes pulse {
            0%, 100% { opacity: 1; }
            50% { opacity: 0.5; }
        }

        .pin-drop {
            animation: bounceIn 0.5s cubic-bezier(0.175, 0.885, 0.32, 1.275);
        }

        @keyframes bounceIn {
            from { transform: translateY(-50px) scale(0.5); opacity: 0; }
            to { transform: translateY(0) scale(1); opacity: 1; }
        }

        /* Logical properties for RTL support */
        .ms-auto { margin-inline-start: auto; }
        .me-md { margin-inline-end: 16px; }
    </style>

<script>
        // Simple Interaction: Draggable Pin Visual Logic
        const pin = document.getElementById('draggable-pin');
        const addressInput = document.getElementById('detected-address');
        const recenterBtn = document.getElementById('recenter-btn');

        let isDragging = false;

        pin.addEventListener('mousedown', (e) => {
            isDragging = true;
            pin.style.transition = 'none';
        });

        document.addEventListener('mousemove', (e) => {
            if (!isDragging) return;
            
            const mapRect = pin.parentElement.getBoundingClientRect();
            let x = e.clientX - mapRect.left;
            let y = e.clientY - mapRect.top;

            // Constrain within map bounds
            x = Math.max(0, Math.min(x, mapRect.width));
            y = Math.max(0, Math.min(y, mapRect.height));

            pin.style.left = `${x}px`;
            pin.style.top = `${y}px`;
            
            // Randomize address for simulation effect
            const addresses = [
                "نهج لندرة، تونس 1000",
                "شارع باريس، تونس العاصمة",
                "نهج مختار عطية، تونس",
                "ساحة النصر، تونس 1001"
            ];
            addressInput.value = addresses[Math.floor(Math.random() * addresses.length)];
        });

        document.addEventListener('mouseup', () => {
            if (isDragging) {
                isDragging = false;
                pin.style.transition = 'all 0.3s cubic-bezier(0.175, 0.885, 0.32, 1.275)';
            }
        });

        // Recenter Logic Simulation
        recenterBtn.addEventListener('click', () => {
            pin.style.left = '50%';
            pin.style.top = '50%';
            addressInput.value = "موقعي الحالي (نهج الحبيب ثامر)";
            
            // Add a temporary animation
            pin.classList.remove('pin-drop');
            void pin.offsetWidth; // trigger reflow
            pin.classList.add('pin-drop');
        });
    </script>
