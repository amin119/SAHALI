<!DOCTYPE html>

<html dir="rtl" lang="ar"><head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<title>Sahali - Nouveau signalement</title>

                    "on-primary-fixed-variant": "#003ab3",
                    "surface-container-low": "#f3f2fe",
                    "on-tertiary-fixed": "#380d00",
                    "surface-container-lowest": "#ffffff",
                    "on-error": "#ffffff",

            "borderRadius": {

<style>
        .material-symbols-outlined {
            font-variation-settings: 'FILL' 0, 'wght' 400, 'GRAD' 0, 'opsz' 24;
        }
        
        body {
            font-family: 'Cairo', sans-serif;
            -webkit-tap-highlight-color: transparent;
        }

        .custom-scrollbar::-webkit-scrollbar {
            width: 4px;
        }
        .custom-scrollbar::-webkit-scrollbar-track {
            background: transparent;
        }
        .custom-scrollbar::-webkit-scrollbar-thumb {
            background: #cbd4ff;
            border-radius: 10px;
        }

        .step-pill {
            transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
        }

        .switch-toggle:checked + .switch-bg {
            background-color: #0038af;
        }
        .switch-toggle:checked + .switch-bg .switch-dot {
            transform: translateX(-20px);
        }

        .record-pulse {
            animation: pulse-ring 2s cubic-bezier(0.4, 0, 0.6, 1) infinite;
        }

        @keyframes pulse-ring {
            0% { transform: scale(1); opacity: 0.5; }
            50% { transform: scale(1.2); opacity: 0.2; }
            100% { transform: scale(1); opacity: 0.5; }
        }
    </style>
<style>
    body {
      min-height: max(884px, 100dvh);
    }
  </style>
  </head>
<body class="bg-surface text-on-surface min-h-screen flex flex-col">
<!-- TopAppBar -->
<header class="bg-surface dark:bg-surface-dim border-b border-outline-variant dark:border-outline shadow-sm flex justify-between items-center px-screen-edge py-md w-full sticky top-0 z-50">
<div class="flex items-center gap-md">
<button class="active:scale-95 transition-transform p-xs hover:bg-surface-container-high rounded-full">
<span class="material-symbols-outlined text-primary dark:text-inverse-primary" style="font-size: 28px;">arrow_forward</span>
</button>
<h1 class="font-section-title-arabic text-section-title-arabic text-primary dark:text-inverse-primary">
                بلاغ جديد
            </h1>
</div>
<div class="flex items-center gap-sm">
<span class="bg-primary-fixed text-on-primary-fixed px-sm py-xs rounded-full font-label-sm text-label-sm">
                المرحلة 4/6
            </span>
</div>
</header>
<main class="flex-1 flex flex-col px-screen-edge py-lg max-w-2xl mx-auto w-full">
<!-- Progress Indicator -->
<div class="flex gap-xs mb-xl">
<div class="h-1.5 flex-1 rounded-full bg-primary-container"></div>
<div class="h-1.5 flex-1 rounded-full bg-primary-container"></div>
<div class="h-1.5 flex-1 rounded-full bg-primary-container"></div>
<div class="h-1.5 flex-1 rounded-full bg-primary-container relative overflow-hidden">
<div class="absolute inset-0 bg-primary w-2/3"></div>
</div>
<div class="h-1.5 flex-1 rounded-full bg-surface-container-highest"></div>
<div class="h-1.5 flex-1 rounded-full bg-surface-container-highest"></div>
</div>
<section class="space-y-lg flex-1">
<!-- Text Description Area -->
<div class="space-y-base">
<label class="block font-label-sm text-label-sm text-on-surface-variant mr-base" for="description">
                    صف المشكلة بالتفصيل
                </label>
<div class="relative group">
<textarea class="w-full bg-surface-container-lowest border border-outline-variant rounded-xl p-md font-body-md-arabic text-body-md-arabic focus:ring-2 focus:ring-primary focus:border-primary outline-none transition-all resize-none shadow-sm group-hover:shadow-md" id="description" maxlength="500" oninput="updateCounter(this)" placeholder="اكتب هنا تفاصيل العطب أو المشكلة التي واجهتها..." rows="6"></textarea>
<div class="absolute bottom-md left-md flex items-center gap-xs text-on-surface-variant font-caption text-caption">
<span id="char-count">0</span>/500
                    </div>
</div>
<p class="text-caption font-caption text-on-surface-variant px-xs">
                    كلما كانت التفاصيل أكثر وضوحاً، زادت سرعة المعالجة.
                </p>
</div>
<!-- Voice Memo Option -->
<div class="p-md bg-secondary-container rounded-xl flex items-center justify-between group cursor-pointer active:scale-[0.98] transition-transform">
<div class="flex items-center gap-md">
<div class="w-12 h-12 bg-on-primary rounded-full flex items-center justify-center shadow-sm text-primary group-hover:scale-110 transition-transform">
<span class="material-symbols-outlined" style="font-variation-settings: 'FILL' 1;">mic</span>
</div>
<div>
<h3 class="font-label-sm text-label-sm text-on-secondary-fixed">إضافة مذكرة صوتية</h3>
<p class="text-caption font-caption text-on-secondary-container">سجل وصفاً سريعاً للمشكلة</p>
</div>
</div>
<span class="material-symbols-outlined text-on-secondary-container">chevron_left</span>
</div>
<!-- Urgency Toggle -->
<div class="p-lg bg-surface-container-low border border-outline-variant rounded-xl flex items-center justify-between">
<div class="flex items-center gap-md">
<div class="w-10 h-10 rounded-full bg-error-container flex items-center justify-center">
<span class="material-symbols-outlined text-error" style="font-variation-settings: 'FILL' 1;">priority_high</span>
</div>
<div>
<h3 class="font-label-sm text-label-sm text-on-background">هل الأمر مستعجل؟</h3>
<p class="text-caption font-caption text-on-surface-variant">فعل هذا الخيار للحالات الطارئة فقط</p>
</div>
</div>
<label class="relative inline-flex items-center cursor-pointer select-none">
<input class="sr-only peer switch-toggle" type="checkbox"/>
<div class="w-11 h-6 bg-outline-variant rounded-full peer-checked:bg-primary transition-colors relative">
<div class="absolute top-[2px] right-[2px] bg-white border-gray-300 border rounded-full h-5 w-5 transition-transform peer-checked:-translate-x-5 shadow-sm"></div>
</div>
</label>
</div>
</section>
<!-- Fixed Bottom Button -->
<div class="sticky bottom-0 pt-lg pb-safe bg-surface mt-auto">
<button class="w-full bg-primary text-on-primary font-section-title-arabic text-section-title-arabic py-md rounded-xl shadow-lg hover:bg-primary-container active:scale-[0.97] transition-all flex items-center justify-center gap-md group">
<span>متابعة</span>
<span class="material-symbols-outlined group-hover:-translate-x-1 transition-transform">arrow_back</span>
</button>
</div>
</main>
<script>
        function updateCounter(textarea) {
            const count = textarea.value.length;
            document.getElementById('char-count').innerText = count;
            
            // Subtle color change as it fills up
            const counterElement = document.getElementById('char-count').parentElement;
            if (count > 450) {
                counterElement.classList.add('text-error');
                counterElement.classList.remove('text-on-surface-variant');
            } else {
                counterElement.classList.remove('text-error');
                counterElement.classList.add('text-on-surface-variant');
            }
        }

        // Voice recording simulation (UI only)
        const voiceBtn = document.querySelector('.bg-secondary-container');
        voiceBtn.addEventListener('click', () => {
            const micIcon = voiceBtn.querySelector('.material-symbols-outlined');
            if (micIcon.innerText === 'mic') {
                micIcon.innerText = 'stop';
                micIcon.classList.add('text-error');
                voiceBtn.classList.add('ring-2', 'ring-error');
                voiceBtn.querySelector('h3').innerText = 'جاري التسجيل...';
                voiceBtn.querySelector('.w-12').classList.add('record-pulse');
            } else {
                micIcon.innerText = 'mic';
                micIcon.classList.remove('text-error');
                voiceBtn.classList.remove('ring-2', 'ring-error');
                voiceBtn.querySelector('h3').innerText = 'إضافة مذكرة صوتية';
                voiceBtn.querySelector('.w-12').classList.remove('record-pulse');
            }
        });
    </script>
</body></html>
