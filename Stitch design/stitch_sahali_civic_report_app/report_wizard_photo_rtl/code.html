<style>
        .material-symbols-outlined {
            font-variation-settings: 'FILL' 0, 'wght' 400, 'GRAD' 0, 'opsz' 24;
        }
        .camera-bracket {
            width: 40px;
            height: 40px;
            border-color: rgba(255, 255, 255, 0.7);
        }
        .camera-bracket-tl { border-top-width: 4px; border-left-width: 4px; top: 20%; left: 10%; }
        .camera-bracket-tr { border-top-width: 4px; border-right-width: 4px; top: 20%; right: 10%; }
        .camera-bracket-bl { border-bottom-width: 4px; border-left-width: 4px; bottom: 35%; left: 10%; }
        .camera-bracket-br { border-bottom-width: 4px; border-right-width: 4px; bottom: 35%; right: 10%; }
        
        /* Subtle pulse for active camera focus */
        @keyframes focus-pulse {
            0% { transform: scale(1); opacity: 0.7; }
            50% { transform: scale(1.05); opacity: 1; }
            100% { transform: scale(1); opacity: 0.7; }
        }
        .focus-active { animation: focus-pulse 2s infinite ease-in-out; }

        .bottom-sheet-shadow {
            box-shadow: 0px -4px 12px rgba(15, 23, 42, 0.12);
        }
    </style>
<style>
    body {
      min-height: max(884px, 100dvh);

<body class="bg-surface text-on-surface font-body-md-arabic overflow-hidden h-screen flex flex-col">
<!-- TopAppBar -->
<header class="bg-surface dark:bg-surface-dim border-b border-outline-variant dark:border-outline shadow-sm flex justify-between items-center px-screen-edge py-md w-full z-50">
<div class="flex items-center gap-md">
<button class="active:scale-95 transition-transform hover:bg-surface-container-high p-xs rounded-full">
<span class="material-symbols-outlined text-primary dark:text-inverse-primary" data-icon="close">close</span>
</button>
<div class="flex flex-col">
<h1 class="font-section-title-arabic text-section-title-arabic text-primary dark:text-inverse-primary leading-none">بلاغ جديد</h1>
<span class="text-label-sm font-label-sm text-on-surface-variant">الخطوة 1 من 6</span>
</div>
</div>
<div class="flex items-center gap-sm">
<div class="h-1.5 w-24 bg-surface-container rounded-full overflow-hidden">
<div class="h-full bg-primary w-1/6"></div>
</div>
</div>
</header>
<!-- Main Viewfinder Area -->
<main class="relative flex-1 bg-black overflow-hidden">
<!-- Mock Viewfinder Image -->
<div class="absolute inset-0 w-full h-full" data-alt="A POV shot from a mobile phone camera showing a slightly damaged urban street in Tunisia. The sun is shining brightly, casting realistic shadows on the cobblestone pavement. The style is cinematic and high-fidelity, representing a professional public service app's camera interface. The colors are natural with a slight cool blue tint to match the Sahali brand identity." style="background-image: url('https://lh3.googleusercontent.com/aida-public/AB6AXuB_qCKK4_Z4zzS60dhuBTEaj0lmq8cP9jaW-xS3_S8VyKDXPgX4O3GEHdHrC9VG6gk3XhYueRCovolh9IKJLpcLXud7I5apOGx4MdhiEZq3dy0HVXuvsXx9kln4jy5BYX4RSYV6fjTS0Vrr-WhUlHeAm5aun5xk6qqcZpS70uO4VQDUuzQyZpWPpBHONv3rIIz__3G3TD_79Ew9LnXbF_t_S6ks4RmzAaPiGGHDu-7VXr17YgBeyHGK2ZJzl2sbW6PIuheQdYsrIg')">
</div>
<!-- Camera Brackets -->
<div class="absolute inset-0 pointer-events-none focus-active">
<div class="absolute camera-bracket camera-bracket-tl rounded-tl-lg"></div>
<div class="absolute camera-bracket camera-bracket-tr rounded-tr-lg"></div>
<div class="absolute camera-bracket camera-bracket-bl rounded-bl-lg"></div>
<div class="absolute camera-bracket camera-bracket-br rounded-br-lg"></div>
</div>
<!-- Camera Controls overlay (Flash, Switch) -->
<div class="absolute top-lg right-screen-edge flex flex-col gap-lg">
<button class="w-12 h-12 rounded-full bg-black/40 backdrop-blur-md flex items-center justify-center text-white active:scale-90 transition-transform">
<span class="material-symbols-outlined" data-icon="flash_on">flash_on</span>
</button>
<button class="w-12 h-12 rounded-full bg-black/40 backdrop-blur-md flex items-center justify-center text-white active:scale-90 transition-transform">
<span class="material-symbols-outlined" data-icon="flip_camera_ios">flip_camera_ios</span>
</button>
</div>
<!-- Bottom Sheet Selection -->
<section class="absolute bottom-0 left-0 right-0 bg-white rounded-t-[24px] px-screen-edge pt-lg pb-xl bottom-sheet-shadow z-40">
<div class="w-12 h-1.5 bg-outline-variant rounded-full mx-auto mb-lg"></div>
<div class="flex flex-col gap-md">
<button class="w-full h-[52px] bg-primary text-on-primary rounded-xl font-body-lg flex items-center justify-center gap-sm active:scale-[0.98] transition-transform shadow-md">
<span class="material-symbols-outlined" data-icon="photo_camera" data-weight="fill" style="font-variation-settings: 'FILL' 1;">photo_camera</span>
<span>التقاط صورة</span>
</button>
<button class="w-full h-[52px] bg-white border-2 border-outline-variant text-on-surface rounded-xl font-body-lg flex items-center justify-center gap-sm active:scale-[0.98] transition-transform">
<span class="material-symbols-outlined" data-icon="image">image</span>
<span>اختيار من المعرض</span>
</button>
</div>
<p class="mt-lg text-center text-on-surface-variant font-label-sm text-label-sm px-xl">
                يرجى التأكد من أن الصورة واضحة وتظهر المشكلة بوضوح للمساعدة في المعالجة السريعة.
            </p>
</section>
</main>
<!-- Bottom Navigation Bar (Hidden on this specific task-focused screen) -->
<!-- Suppressed per "Shell Visibility & Relevance" rule: Transactional/Task-focused screens exclude nav shell -->
<script>
        // Micro-interaction for the camera trigger
        document.querySelector('button.bg-primary').addEventListener('click', () => {
            // Flash effect
            const flash = document.createElement('div');
            flash.className = 'fixed inset-0 bg-white z-[60] opacity-0 transition-opacity duration-100';
            document.body.appendChild(flash);
            
            setTimeout(() => {
                flash.style.opacity = '1';
                setTimeout(() => {
                    flash.style.opacity = '0';
                    setTimeout(() => flash.remove(), 100);
                }, 100);
            }, 50);
        });
    </script>
