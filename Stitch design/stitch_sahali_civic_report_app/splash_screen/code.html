<!DOCTYPE html>

<html dir="rtl" lang="ar"><head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<title>Sahali - Splash Screen</title>

                    "surface-container-high": "#e8e7f3",

                    "on-error": "#ffffff",

                    "secondary-container": "#d0e1fb",

                    "on-tertiary": "#ffffff",

                    "surface-dim": "#d9d9e4",

                    "tertiary-fixed": "#ffdbcf",
                    "on-primary-fixed": "#001550",
                    "on-secondary": "#ffffff",
                    "tertiary": "#7e2700",
                    "secondary-fixed-dim": "#b7c8e1",
                    "on-primary": "#ffffff",

                    "secondary-fixed": "#d3e4fe",
                    "surface-container": "#ededf8",

<style>
        .material-symbols-outlined {
            font-variation-settings: 'FILL' 0, 'wght' 400, 'GRAD' 0, 'opsz' 24;
        }

        @keyframes pulse-dot {
            0%, 100% { opacity: 0.3; transform: scale(1); }
            50% { opacity: 1; transform: scale(1.2); }
        }

        .dot-1 { animation: pulse-dot 1.5s infinite ease-in-out; }
        .dot-2 { animation: pulse-dot 1.5s infinite ease-in-out 0.2s; }
        .dot-3 { animation: pulse-dot 1.5s infinite ease-in-out 0.4s; }

        .splash-gradient {
            background: linear-gradient(135deg, #0F172A 0%, #1B3A6B 100%);
        }

        .logo-shadow {
            filter: drop-shadow(0 0 12px rgba(255, 255, 255, 0.15));
        }
    </style>
<style>
    body {
      min-height: max(884px, 100dvh);
    }
  </style>
</head>
<body class="antialiased">
<!-- Splash Screen Container -->
<main class="relative h-screen w-full flex flex-col items-center justify-between splash-gradient overflow-hidden">
<!-- Atmospheric Background Layer -->

<!-- Center Content: Logo & Branding -->
<div class="flex-grow flex flex-col items-center justify-center relative z-10 px-screen-edge text-center">
<!-- Logo Mockup -->
<div class="mb-lg logo-shadow animate-bounce-slow">
<div class="w-24 h-24 bg-white rounded-2xl flex items-center justify-center relative transform rotate-3 hover:rotate-0 transition-transform duration-500">
<!-- Integrated S & Pin Concept -->
<svg fill="none" height="60" viewbox="0 0 24 24" width="60" xmlns="http://www.w3.org/2000/svg">
<path d="M12 2C8.13 2 5 5.13 5 9c0 5.25 7 13 7 13s7-7.75 7-13c0-3.87-3.13-7-7-7zm0 9.5c-1.38 0-2.5-1.12-2.5-2.5s1.12-2.5 2.5-2.5 2.5 1.12 2.5 2.5-1.12 2.5-2.5 2.5z" fill="#0F172A"></path>
<path d="M12 7.5V10.5M10.5 9H13.5" stroke="white" stroke-linecap="round" stroke-width="1.5"></path>
<path class="opacity-50" d="M7 11.5C7 13.5 12 18 12 18" stroke="#1B3A6B" stroke-linecap="round" stroke-linejoin="round" stroke-width="2"></path>
</svg>
<!-- "S" Stylization via negative space or overlay -->
<div class="absolute inset-0 flex items-center justify-center opacity-10 pointer-events-none">
<span class="text-6xl font-black text-black">S</span>
</div>
</div>
</div>
<!-- Brand Name Arabic -->
<h1 class="font-display-hero-arabic text-[36px] text-white leading-none mb-xs">
                صاحلي
            </h1>
<!-- Brand Name Latin -->
<h2 class="font-display-hero text-[24px] text-white/70 tracking-tight">
                Sahali
            </h2>
</div>
<!-- Bottom Content: Tagline & Progress -->
<div class="w-full flex flex-col items-center pb-xl relative z-10">
<!-- Tagline -->
<p class="font-body-md-arabic text-[15px] text-white/50 mb-lg px-screen-edge text-center">
                بلّغ على المشكلة. سوا نصلحوها.
            </p>
<!-- Progress Indicators -->
<div class="flex space-x-2 rtl:space-x-reverse items-center justify-center h-8">
<div class="w-2.5 h-2.5 bg-white rounded-full dot-1"></div>
<div class="w-2.5 h-2.5 bg-white rounded-full dot-2"></div>
<div class="w-2.5 h-2.5 bg-white rounded-full dot-3"></div>
</div>
</div>
<!-- Decorative Elements -->
<div class="absolute bottom-0 left-0 w-full h-1/3 bg-gradient-to-t from-black/20 to-transparent pointer-events-none"></div>
</main>
<script>
        // Simple micro-interaction for the splash screen
        document.addEventListener('DOMContentLoaded', () => {
            // Optional: Auto-transition simulation
            setTimeout(() => {
                const logo = document.querySelector('.logo-shadow');
                if(logo) {
                    logo.classList.add('scale-110');
                    logo.style.transition = 'transform 1.2s cubic-bezier(0.34, 1.56, 0.64, 1)';
                }
            }, 500);

            // Ripple effect on tap anywhere
            document.body.addEventListener('click', (e) => {
                const ripple = document.createElement('div');
                ripple.className = 'absolute rounded-full bg-white/10 pointer-events-none transform -translate-x-1/2 -translate-y-1/2 animate-ping';
                ripple.style.width = '100px';
                ripple.style.height = '100px';
                ripple.style.left = `${e.clientX}px`;
                ripple.style.top = `${e.clientY}px`;
                document.body.appendChild(ripple);
                setTimeout(() => ripple.remove(), 1000);
            });
        });
    </script>
</body></html>
