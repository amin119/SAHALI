<body class="flex flex-col min-h-screen">
<!-- Auth Shell Excludes Shared Nav as per UX Rules -->
<main class="flex-grow flex flex-col items-center justify-center px-screen-edge py-xl">
<!-- Header / Logo Area -->
<div class="w-full max-w-md text-center mb-xl">
<h1 class="font-display-hero-arabic text-display-hero-arabic text-primary mb-xs">سهلي</h1>

<div class="flex border-b border-outline-variant">
<button class="flex-1 py-md font-label-sm text-label-sm active-tab form-transition" id="tab-login" onclick="switchTab('login')">Connexion</button>
<button class="flex-1 py-md font-label-sm text-label-sm text-on-surface-variant form-transition" id="tab-register" onclick="switchTab('register')">Inscription</button>
</div>
<div class="p-lg">
<!-- Login Form -->
<form class="space-y-md" id="form-login">
<div class="space-y-xs">
<label class="block font-label-sm text-label-sm text-on-surface" for="login-phone">رقم الهاتف</label>
<div class="relative">
<span class="absolute inset-y-0 right-0 flex items-center pr-md pointer-events-none text-outline">
<span class="material-symbols-outlined">phone_iphone</span>
</span>
<input class="w-full pr-12 pl-md py-md bg-surface border border-outline-variant rounded-xl focus:ring-2 focus:ring-primary focus:border-primary outline-none transition-all font-body-md text-body-md" dir="ltr" id="login-phone" placeholder="99 999 999" type="tel"/>
</div>
</div>
<div class="space-y-xs">
<label class="block font-label-sm text-label-sm text-on-surface" for="login-password">كلمة المرور</label>
<div class="relative">
<span class="absolute inset-y-0 right-0 flex items-center pr-md pointer-events-none text-outline">
<span class="material-symbols-outlined">lock</span>
</span>
<input class="w-full pr-12 pl-md py-md bg-surface border border-outline-variant rounded-xl focus:ring-2 focus:ring-primary focus:border-primary outline-none transition-all font-body-md text-body-md" id="login-password" placeholder="••••••••" type="password"/>
</div>
</div>
<div class="flex justify-start">
<a class="text-caption font-caption text-primary hover:underline" href="#">هل نسيت كلمة المرور؟</a>
</div>
<button class="w-full bg-primary text-on-primary py-md rounded-xl font-label-sm text-label-sm hover:opacity-90 active:scale-[0.98] transition-all h-[52px] shadow-sm" type="submit">تسجيل الدخول</button>
</form>
<!-- Register Form (Hidden by default) -->
<form class="hidden space-y-md" id="form-register">
<div class="space-y-xs">
<label class="block font-label-sm text-label-sm text-on-surface" for="reg-name">الاسم الكامل</label>
<div class="relative">
<span class="absolute inset-y-0 right-0 flex items-center pr-md pointer-events-none text-outline">
<span class="material-symbols-outlined">person</span>
</span>
<input class="w-full pr-12 pl-md py-md bg-surface border border-outline-variant rounded-xl focus:ring-2 focus:ring-primary focus:border-primary outline-none transition-all font-body-md text-body-md" id="reg-name" placeholder="الاسم واللقب" type="text"/>
</div>
</div>
<div class="space-y-xs">
<label class="block font-label-sm text-label-sm text-on-surface" for="reg-phone">رقم الهاتف</label>
<div class="flex gap-2" dir="ltr">
<div class="flex items-center justify-center px-4 bg-surface-container border border-outline-variant rounded-xl font-body-md text-body-md text-on-surface">
                                +216
                            </div>
<div class="relative flex-grow">
<input class="w-full px-md py-md bg-surface border border-outline-variant rounded-xl focus:ring-2 focus:ring-primary focus:border-primary outline-none transition-all font-body-md text-body-md" id="reg-phone" placeholder="99 999 999" type="tel"/>
</div>
</div>
</div>

</div>
</div>
<div class="flex items-center gap-xs">
<input class="rounded border-outline-variant text-primary focus:ring-primary" id="terms" type="checkbox"/>
<label class="text-caption font-caption text-on-surface-variant" for="terms">أوافق على <a class="text-primary hover:underline" href="#">الشروط والأحكام</a></label>
</div>
<button class="w-full bg-primary text-on-primary py-md rounded-xl font-label-sm text-label-sm hover:opacity-90 active:scale-[0.98] transition-all h-[52px] shadow-sm" type="submit">إنشاء حساب</button>

<path d="M12 5.38c1.62 0 3.06.56 4.21 1.64l3.15-3.15C17.45 2.09 14.97 1 12 1 7.7 1 3.99 3.47 2.18 7.07l3.66 2.84c.87-2.6 3.3-4.53 6.16-4.53z" fill="#EA4335"></path>

</div>
</div>

<!-- Support Info -->
<div class="mt-lg text-center">
<p class="text-caption font-caption text-on-surface-variant">بحاجة للمساعدة؟ <a class="text-primary font-bold" href="#">اتصل بنا</a></p>
</div>
</main>
<!-- Illustrative Footer Background (Pure CSS subtle pattern) -->
<div class="fixed bottom-0 left-0 w-full h-1/4 opacity-10 pointer-events-none -z-10 bg-[radial-gradient(#0038af_0.5px,transparent_0.5px)] [background-size:20px_20px]"></div>
<script>
        function switchTab(type) {
            const loginForm = document.getElementById('form-login');
            const registerForm = document.getElementById('form-register');
            const loginTab = document.getElementById('tab-login');
            const registerTab = document.getElementById('tab-register');

            if (type === 'login') {
                loginForm.classList.remove('hidden');
                registerForm.classList.add('hidden');
                loginTab.classList.add('active-tab');
                loginTab.classList.remove('text-on-surface-variant');
                registerTab.classList.remove('active-tab');
                registerTab.classList.add('text-on-surface-variant');
            } else {
                loginForm.classList.add('hidden');
                registerForm.classList.remove('hidden');
                registerTab.classList.add('active-tab');
                registerTab.classList.remove('text-on-surface-variant');
                loginTab.classList.remove('active-tab');
                loginTab.classList.add('text-on-surface-variant');
            }
        }

        // Simple animation on load
        window.addEventListener('DOMContentLoaded', () => {
            const card = document.querySelector('.bg-surface-container-lowest');
            card.style.opacity = '0';
            card.style.transform = 'translateY(20px)';
            
            setTimeout(() => {
                card.style.transition = 'all 0.6s cubic-bezier(0.22, 1, 0.36, 1)';
                card.style.opacity = '1';
                card.style.transform = 'translateY(0)';
            }, 100);
        });
    </script>
